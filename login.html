<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SETU Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="login.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

<div class="login-container">

  <div class="login-card">

    <!-- HEADER -->
    <div class="login-header">
      <div class="logo-icon">🎓</div>
      <h2>Welcome Back</h2>
      <p>Login to continue learning</p>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm">

      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="Enter email" required>

      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter password" required>

      <div class="forgot-row">
        <a href="#">Forgot Password?</a>
      </div>

      <div id="loginStatus" style="text-align:center; font-weight:600; padding: 10px;"></div>
      <button type="submit" class="primary full">Login</button>

    </form>

    <!-- DIVIDER -->
    <div class="divider-line">
      <span>OR</span>
    </div>

    <!-- SOCIAL LOGIN -->
    <div class="social-login">
      <!-- Google Sign In Button Container -->
      <div id="g_id_onload"
           data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="handleGoogleSignIn"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-shape="rectangular"
           data-theme="outline"
           data-text="signin_with"
           data-size="large"
           data-logo_alignment="left"
           data-width="100%">
      </div>

      <button type="button" class="social-btn microsoft" style="margin-top: 10px;">
        <img src="https://www.svgrepo.com/show/448239/microsoft.svg">
        Continue with Microsoft
      </button>

    </div>

    <!-- FOOTER -->
    <div class="login-footer">
      <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>

  </div>

</div>

<script src="login.js?v=2"></script>
</body>
</html>
