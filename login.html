<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SETU Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">

  <div class="login-card">

    <!-- HEADER -->
    <div class="login-header">
      <div class="logo-icon">🎓</div>
      <h2>Welcome Back</h2>
      <p>Login to continue learning</p>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm">

      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="Enter email" required>

      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter password" required>

      <div class="forgot-row">
        <a href="#">Forgot Password?</a>
      </div>

      <div id="loginStatus" style="text-align:center; font-weight:600; padding: 10px;"></div>
      <button type="submit" class="primary full">Login</button>

    </form>

    <!-- DIVIDER -->
    <div class="divider-line">
      <span>OR</span>
    </div>

    <!-- SOCIAL LOGIN -->
    <div class="social-login">

      <button type="button" class="social-btn google">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg">
        Continue with Google
      </button>

      <button type="button" class="social-btn microsoft">
        <img src="https://www.svgrepo.com/show/448239/microsoft.svg">
        Continue with Microsoft
      </button>

    </div>

    <!-- FOOTER -->
    <div class="login-footer">
      <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>

  </div>

</div>

<script src="login.js?v=2"></script>
</body>
</html>
